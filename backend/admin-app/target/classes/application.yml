server:
  port: 8080

spring:
  application:
    name: admin-backend
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/admin_scaffold?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_general_ci&characterSetResults=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:init.sql
      encoding: UTF-8

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: change-me-to-a-long-random-secret-change-me
  expire-hours: 12
